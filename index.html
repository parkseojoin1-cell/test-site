<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 테스트 배포</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>개발자 커뮤니티 (테스트)</h1>
            <p>Render 호스팅 배포 성공을 축하합니다!</p>
        </header>
        
        <main>
            <section id="post-form">
                <h2>글쓰기</h2>
                <input type="text" id="post-title" placeholder="제목을 입력하세요">
                <textarea id="post-content" placeholder="내용을 입력하세요"></textarea>
                <button onclick="addPost()">게시하기</button>
            </section>
            
            <section id="post-list">
                <h2>최신 게시물</h2>
                <ul id="posts">
                    <li>
                        <h3>안녕하세요, 첫 번째 게시물입니다!</h3>
                        <p>이곳에 여러분의 생각이 담긴 글을 작성해 보세요.</p>
                        <span class="date">2026.05.27</span>
                    </li>
                </ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
